name: Release and Publish Docker image

on:
  push:
    branches:
      - master
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      tag: ${{ steps.version.outputs.tag }}
      is_new: ${{ steps.tag_check.outputs.is_new }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VALUE=$(node -p "require('./package.json').version")
          echo "value=$VALUE" >> $GITHUB_OUTPUT
          echo "tag=v$VALUE" >> $GITHUB_OUTPUT

      - name: Check if release tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "is_new=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "is_new=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        if: steps.tag_check.outputs.is_new == 'true'
        run: |
          PREV=$(git tag --sort=-version:refname | head -1)
          if [ -n "$PREV" ]; then
            LOG=$(git log "${PREV}..HEAD" --pretty=format:"- %s (%h)")
          else
            LOG=$(git log --pretty=format:"- %s (%h)")
          fi
          [ -z "$LOG" ] && LOG="Initial release."
          {
            echo "body<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.tag_check.outputs.is_new == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.body }}

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.is_new == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jackettio:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jackettio:${{ needs.release.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Jackett and Debrid on Stremio
            org.opencontainers.image.title=Jackettio
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
